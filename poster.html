<!-- Lightbox 初始化 -->
<script>
// 確保 header/footer 載入後再啟動 Lightbox
$(window).on("load", function () {
  setTimeout(function () {
    if (typeof lightbox !== "undefined") {
      lightbox.option({
        resizeDuration: 200,
        fadeDuration: 200,
        imageFadeDuration: 200,
        wrapAround: true,
        albumLabel: "第 %1 張，共 %2 張"
      });
      console.log("✅ Lightbox 已啟動");
    }
  }, 800);
});
