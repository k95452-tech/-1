<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="keywords" content="奇美醫院,奇美,掛號,醫院,醫療,醫學中心,Chimei,Chimei Hospital,Chimei Medical Center" />
<meta name="description" content="奇美醫院健康台灣深耕計畫" />
<title>奇美醫院健康台灣深耕計畫</title>
<!--醫院LOGO-->
<link rel="icon" href="assets/images/favicon.ico">
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script> 
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
<!-- Custom styles for this template -->
<link rel="stylesheet" href="assets/lib/css/bootstrap/bootstrap.min.css">
<link rel="stylesheet" href="assets/lib/css/swiper/swiper-bundle.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="assets/css/all_style.css">
<!-- 瀏覽人次 -->
<script type="text/javascript" src="https://www.chimei.org.tw/fileinfodoc/js/ajax.js"></script> 
<script type="text/javascript" src="https://www.chimei.org.tw/fileinfodoc/js/getfileInfo.js"></script> 
<script type="text/javascript" src="https://www.chimei.org.tw/countdoc/js/ajax.js"></script> 
<script type="text/javascript" src="https://www.chimei.org.tw/countdoc/js/count.js"></script>
<!--以下依照實際情況增加減，以上每頁都會出現--> 
<!--屬於電子報樣式-->
<link rel="stylesheet" href="assets/css/epaper_style.css">
</head>
<body class="bg-gray-50" onload="getFileInfo('59400');getCounter('59400');">
<!--導覽列--> 
<div id="header_layer"></div>

<!-- 內容區塊 -->
<main class="container mx-auto px-4 sm:px-6 lg:px-8 py-8">

  <!-- ===== 電子報區塊 ===== -->
  <section id="epaper" class="page-section px-4 sm:px-6 lg:px-8 py-8">
    <div class="max-w-7xl mx-auto p-8 bg-white rounded-lg shadow">
      <h2 class="text-2xl md:text-3xl font-bold text-cyan-700 mb-6 text-center">電子報</h2>
	  <div id="epaper-list" class="row row-cols-1 row-cols-sm-2 row-cols-lg-4 g-4"></div>
    </div>
  </section>
</main>
<!--footer--> 
<div id="footer_layer"></div>

<div id="epaper-viewer" class="epaper-viewer">
    
    <div class="newsletter-toolbar">
        <div class="toolbar-info text-white">
            <span id="newsletterTitle">電子報閱讀模式</span>
        </div>

        <div class="toolbar-actions">
            <button class="btn btn-link text-white" onclick="shareNewsletter()" title="分享">
                <i class="bi bi-share"></i>
            </button>
            <button class="btn btn-link text-white" onclick="toggleFullscreen()" title="全螢幕模式">
                <i id="fullscreen-icon" class="bi bi-arrows-fullscreen"></i>
            </button>
            <button class="btn btn-link text-white" onclick="zoomOut()" title="縮小">
                <i class="bi bi-zoom-out"></i>
            </button>
            <button class="btn btn-link text-white" onclick="zoomIn()" title="放大">
                <i class="bi bi-zoom-in"></i>
            </button>
            <button class="btn btn-link text-white" onclick="downloadImage()" title="下載目前頁面">
                <i class="bi bi-download"></i>
            </button>
            <button class="btn btn-link text-white ms-3" onclick="closeViewer()" title="關閉">
                <i class="bi bi-x-lg" style="font-size: 1.5rem;"></i>
            </button>
        </div>
    </div>

    <div class="viewer-content h-100 position-relative">
        
        <div class="main-swiper-section position-absolute w-100 h-100 start-0 top-0 overflow-hidden">
            <div class="swiper mySwiper h-100">
                <div class="swiper-wrapper" id="swiper-wrapper"></div>
                
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
                
                <div class="swiper-pagination"></div>
            </div>
        </div>

        <button id="toggleThumbsBtn" class="btn-toggle-thumbs" onclick="toggleThumbs()">
            <i class="bi bi-chevron-down"></i> 隱藏縮圖
        </button>

        <div id="thumbsSection" class="thumbs-swiper-section bg-black py-2">
            <div thumbsSlider="" class="swiper thumbSwiper h-100">
                <div class="swiper-wrapper" id="thumb-wrapper"></div>
            </div>
        </div>
    </div>
</div>

<!--載入導覽列-->
<script src="assets/js/header_layer.js" defer></script> 
<!--載入footer--> 
<script src="assets/js/footer_layer.js" defer></script>
<!--以下依照實際情況增加減，以上每頁都會出現--> 
<!--電子報功能--> 
<script src="assets/lib/js/bootstrap/bootstrap.bundle.min.js"></script>
<script src="assets/lib/js/swiper/swiper-bundle.min.js"></script>
<script src="assets/js/epaper-control.js"></script>
<!--載入電子報列表資料--> 
<script src="data/epaper/epaper-list.js"></script> 
</body>
</html>
