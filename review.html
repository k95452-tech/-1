<!-- ============ 圖片輪播 Modal ============ -->
<div id="imgModal" class="hidden fixed inset-0 z-[9999]">
  <div class="absolute inset-0 bg-black/70" onclick="closeImgModal()"></div>

  <div class="relative max-w-5xl mx-auto mt-8 p-4">
    <div class="bg-white rounded-2xl overflow-hidden shadow-xl">
      <div class="p-3 border-b flex items-center justify-between gap-3">
        <div id="imgModalTitle" class="text-sm text-gray-700 truncate"></div>
        <div class="flex items-center gap-2">
          <span id="imgCounter" class="text-sm text-gray-500"></span>
          <button class="px-3 py-1.5 rounded-lg border hover:bg-gray-50" onclick="closeImgModal()">關閉</button>
        </div>
      </div>

      <div class="bg-black relative flex items-center justify-center">
        <!-- 上一張 -->
        <button type="button"
                class="absolute left-3 md:left-4 bg-white/90 hover:bg-white rounded-full w-10 h-10 flex items-center justify-center"
                onclick="prevImg()"
                aria-label="上一張">
          <i class="fa-solid fa-chevron-left"></i>
        </button>

        <!-- 圖片 -->
        <img id="imgModalEl" src="" alt="" class="w-full max-h-[80vh] object-contain">

        <!-- 下一張 -->
        <button type="button"
                class="absolute right-3 md:right-4 bg-white/90 hover:bg-white rounded-full w-10 h-10 flex items-center justify-center"
                onclick="nextImg()"
                aria-label="下一張">
          <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>

      <!-- dots -->
      <div id="imgDots" class="p-3 bg-white flex flex-wrap gap-2 justify-center"></div>
    </div>
  </div>
</div>

<script>
  // ===== 輪播狀態 =====
  let modalImgs = [];
  let modalIdx = 0;

  // openImgModal：保持你原本的命名，讓 onclick 不用大改
  function openImgModal(imgsString, titleText) {
    modalImgs = String(imgsString || "")
      .split("|")
      .map(s => s.trim())
      .filter(Boolean);

    if (modalImgs.length === 0) {
      console.warn("沒有圖片可顯示：請檢查 data-imgs 是否填入正確路徑（用 | 分隔）。");
      return;
    }

    modalIdx = 0;

    const modal = document.getElementById("imgModal");
    const title = document.getElementById("imgModalTitle");

    if (title) title.textContent = titleText || "活動照片";

    modal.classList.remove("hidden");
    document.body.classList.add("overflow-hidden");

    renderModalImg();
  }

  function closeImgModal() {
    const modal = document.getElementById("imgModal");
    const img = document.getElementById("imgModalEl");

    if (modal) modal.classList.add("hidden");
    if (img) img.src = "";

    document.body.classList.remove("overflow-hidden");

    modalImgs = [];
    modalIdx = 0;
  }

  function renderModalImg() {
    const imgEl = document.getElementById("imgModalEl");
    const counterEl = document.getElementById("imgCounter");
    const dotsEl = document.getElementById("imgDots");

    if (!imgEl || !counterEl || !dotsEl) return;

    imgEl.src = modalImgs[modalIdx];
    imgEl.alt = `活動照片 ${modalIdx + 1}`;

    counterEl.textContent = `${modalIdx + 1} / ${modalImgs.length}`;

    dotsEl.innerHTML = modalImgs.map((_, i) => `
      <button type="button"
              class="w-2.5 h-2.5 rounded-full ${i === modalIdx ? 'bg-cyan-700' : 'bg-gray-300 hover:bg-gray-400'}"
              onclick="goImg(${i})"
              aria-label="第 ${i + 1} 張"></button>
    `).join("");
  }

  function prevImg() {
    if (modalImgs.length === 0) return;
    modalIdx = (modalIdx - 1 + modalImgs.length) % modalImgs.length;
    renderModalImg();
  }

  function nextImg() {
    if (modalImgs.length === 0) return;
    modalIdx = (modalIdx + 1) % modalImgs.length;
    renderModalImg();
  }

  function goImg(i) {
    modalIdx = i;
    renderModalImg();
  }

  // Esc 關閉、左右鍵切換
  document.addEventListener("keydown", (e) => {
    const modal = document.getElementById("imgModal");
    const isOpen = modal && !modal.classList.contains("hidden");
    if (!isOpen) return;

    if (e.key === "Escape") closeImgModal();
    if (e.key === "ArrowLeft") prevImg();
    if (e.key === "ArrowRight") nextImg();
  });

  // 讓 inline onclick 找得到
  window.openImgModal = openImgModal;
  window.closeImgModal = closeImgModal;
  window.prevImg = prevImg;
  window.nextImg = nextImg;
  window.goImg = goImg;
</script>
